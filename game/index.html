<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信长之野望-战国夺旗</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#0a0a18;color:#e0e0e0;min-height:100vh;overflow-x:hidden}
header{background:linear-gradient(135deg,#16213e,#0f3460);padding:8px 16px;display:flex;align-items:center;gap:10px;border-bottom:2px solid #e94560;flex-wrap:wrap}
header .terrain-select{display:flex;gap:3px;margin-left:8px}
header .terrain-select .btn{padding:2px 6px;font-size:10px}
header h1{font-size:18px;background:linear-gradient(90deg,#e94560,#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.header-info{display:flex;gap:8px 16px;font-size:12px;color:#ccc;flex-wrap:wrap;margin-left:auto;align-items:center}
.header-info .stat{display:flex;align-items:center;gap:3px;background:#111128;padding:2px 8px;border-radius:4px;border:1px solid #1a1a3e}
.header-info .stat b{font-size:15px}
.round-display{background:#e94560;padding:1px 10px;border-radius:4px;font-weight:700;font-size:14px;color:#fff}
.troop-display{font-size:18px!important;font-weight:700}
.troop-display.player{color:#4fc3f7}
.troop-display.ai{color:#ef5350}
.inc-tag{font-size:9px;color:#888;margin-left:2px}
.btn{background:#e94560;color:#fff;border:none;padding:6px 14px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.btn:hover{background:#c73652;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-gold{background:linear-gradient(135deg,#f5a623,#e94560)}
.btn-gold:hover{background:linear-gradient(135deg,#d4901e,#c73652)}
.btn-small{padding:3px 8px;font-size:11px}
.btn-xs{padding:2px 6px;font-size:10px}
.btn-outline{background:transparent;border:1px solid #e94560;color:#e94560}
.btn-outline:hover{background:#e94560;color:#fff}
.btn-outline.active{background:#e94560;color:#fff}
.container{display:flex;gap:10px;padding:8px 12px;flex-wrap:wrap}
.board-wrapper{flex:0 0 auto}
.phase-banner{font-size:12px;color:#aaa;text-align:center;margin-bottom:3px;padding:3px 0}
.phase-banner .highlight{color:#f5a623;font-weight:700}
.board{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;background:#080818;padding:5px;border-radius:6px;border:2px solid #1a1a3e;width:fit-content;position:relative}
.board .divider{position:absolute;left:5px;right:5px;height:2px;background:linear-gradient(90deg,transparent,#e94560,transparent);top:calc(50% - 1px);pointer-events:none;z-index:1}
.cell{width:64px;height:64px;border-radius:4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;transition:.12s;position:relative;overflow:hidden;border:1.5px solid #1a1a3e}
.cell:hover{border-color:#f5a623!important;z-index:2}
.cell.has-both{background:linear-gradient(135deg,#0a0a22 50%,#0d0d1d 50%)!important;border-color:#e94560!important}
.cell .both-units{display:flex;flex-direction:column;width:100%;height:100%;font-size:7px;line-height:1.2;padding:1px}
.cell .both-units .bu-player,.cell .both-units .bu-ai{display:flex;align-items:center;gap:2px;justify-content:center}
.cell .both-units .bu-player{color:#4fc3f7}
.cell .both-units .bu-ai{color:#ef5350}
.cell .both-units .bu-vs{font-size:9px;font-weight:700;color:#f5a623;text-align:center;line-height:1;margin:0}
.cell .both-units .bu-name{max-width:28px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell .both-units .bu-troops{font-weight:700;font-size:8px}
.cell .both-units .bu-player img,.cell .both-units .bu-ai img{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,.2);flex-shrink:0}
.cell.inactive{background:#050510!important;border-color:#0a0a1a!important;cursor:default!important;opacity:.35}
.cell.inactive:hover{border-color:#0a0a1a!important}
.cell.player-zone{background:#0a0a22}
.cell.ai-zone{background:#0d0d1d}
.cell.highlight{box-shadow:0 0 10px rgba(245,166,35,.5)!important;border-color:#f5a623!important}
.cell.battle-flash{animation:battleFlash .4s}
@keyframes battleFlash{0%,100%{border-color:#e94560}50%{border-color:#fff;box-shadow:0 0 20px #e94560}}
@keyframes slideIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes flagWave{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes retreatAnim{0%,100%{transform:scale(1);opacity:1}20%{transform:scale(.85) translateY(8px);opacity:.6}50%{transform:scale(1.08) translateY(-4px)}75%{transform:scale(.95) translateY(2px)}}
@keyframes powerAnim{0%,100%{box-shadow:0 0 5px #f5a623;border-color:#f5a623}50%{box-shadow:0 0 25px #f5a623,0 0 50px #ffd700;border-color:#ffd700;transform:scale(1.08)}}
.cell.retreating{animation:retreatAnim .8s ease-in-out;z-index:10}
.cell.impressive{animation:powerAnim .8s ease-in-out;z-index:10}

/* Player vs AI distinct themes */
.cell.has-player{border-color:#1565c0;background:linear-gradient(135deg,#0a1628,#0d2137)}
.cell.has-player .u-avatar{border-color:#4fc3f7}
.cell.has-player .u-flag{color:#4fc3f7}
.cell.has-player:hover{border-color:#4fc3f7!important}
.cell.has-player .u-owner{color:#4fc3f7}
.cell.has-player .u-troops{color:#4fc3f7}

.cell.has-ai{border-color:#b71c1c;background:linear-gradient(135deg,#1a0a0a,#2a0d0d)}
.cell.has-ai .u-avatar{border-color:#ef5350}
.cell.has-ai .u-flag{color:#ef5350}
.cell.has-ai:hover{border-color:#ef5350!important}
.cell.has-ai .u-owner{color:#ef5350}
.cell.has-ai .u-troops{color:#ef5350}

.cell .u-avatar{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.2)}
.cell .u-name{font-size:8px;font-weight:600;color:#ddd;line-height:1.1;text-align:center;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.cell .u-power{font-size:8px;font-weight:700;line-height:1;position:absolute;top:1px;right:3px;color:#f5a623;text-shadow:0 0 4px rgba(0,0,0,.8);background:rgba(0,0,0,.5);padding:0 2px;border-radius:2px}
.cell.has-player .u-power{color:#4fc3f7}
.cell.has-ai .u-power{color:#ef5350}
.cell .u-troops{font-size:10px;font-weight:700;line-height:1;position:absolute;bottom:3px;right:4px;text-shadow:0 0 4px rgba(0,0,0,.8)}
.cell .u-flag{font-size:16px;position:absolute;top:-1px;left:1px;animation:flagWave 1.5s infinite;filter:drop-shadow(0 0 3px rgba(255,215,0,.6))}
.cell .u-owner{position:absolute;bottom:2px;left:4px;font-size:10px}
.right-panel{flex:1;min-width:300px;display:flex;flex-direction:column;gap:8px}
.section{background:#0e0e24;border:1px solid #1a1a3e;border-radius:6px;padding:8px 10px}
.section h3{font-size:13px;color:#f5a623;margin-bottom:4px}
.section .sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:3px}
.cat-filters{display:flex;gap:2px;flex-wrap:wrap}
.cat-btn{padding:1px 7px;border-radius:3px;border:1px solid #333;background:transparent;color:#888;cursor:pointer;font-size:10px;transition:.12s}
.cat-btn:hover{border-color:#e94560;color:#e94560}
.cat-btn.active{background:#e94560;color:#fff;border-color:#e94560}
.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:3px;max-height:170px;overflow-y:auto;padding-right:3px}
.col-grid::-webkit-scrollbar{width:3px}
.col-grid::-webkit-scrollbar-thumb{background:#e94560;border-radius:2px}
.char-card{background:#12122e;border:1px solid #222255;border-radius:4px;padding:3px 2px;cursor:pointer;transition:.1s;text-align:center}
.char-card:hover{border-color:#e94560;transform:translateY(-1px)}
.char-card .cc-avatar{width:22px;height:22px;border-radius:50%;margin:0 auto 1px}
.char-card .cname{font-size:9px;font-weight:600;color:#ccc;line-height:1.2}
.char-card .cmeta{font-size:7px;color:#666}
.char-card .crating{font-size:7px;color:#f5a623}
.char-card.selected{border-color:#f5a623;box-shadow:0 0 4px #f5a623}
  .char-card.used{opacity:.25;cursor:default}
  .char-card.cooldown{opacity:.4;cursor:default;border-color:#4fc3f7;position:relative}
  .char-card.cooldown .freeze-badge{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;color:#4fc3f7;font-size:10px;font-weight:700;background:rgba(0,0,0,.55);border-radius:4px;pointer-events:none}
  .char-card.dead{opacity:.3;cursor:default;border-color:#e94560;position:relative}
  .char-card.dead .dead-badge{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;color:#e94560;font-size:20px;font-weight:900;background:rgba(0,0,0,.7);border-radius:4px;pointer-events:none;text-shadow:0 0 12px #e94560}

/* detail panel */
.detail-panel{background:#0e0e24;border:1px solid #f5a623;border-radius:6px;padding:10px;display:none}
.detail-panel.show{display:block}
.detail-panel .d-top{display:flex;gap:10px;align-items:center;margin-bottom:6px}
.detail-panel .d-avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0}
.detail-panel .d-info{flex:1}
.detail-panel .dname{font-size:16px;font-weight:700;margin-bottom:1px}
.detail-panel .dmeta{font-size:11px;color:#aaa}
.detail-panel .stat-row{display:flex;align-items:center;gap:6px;margin:2px 0}
.detail-panel .stat-row .slabel{width:36px;font-size:10px;color:#777;text-align:right;flex-shrink:0}
.detail-panel .stat-row .sbar{flex:1;height:8px;background:#1a1a3e;border-radius:4px;overflow:hidden}
.detail-panel .stat-row .sfill{height:100%;border-radius:4px;transition:width .3s}
.detail-panel .stat-row .sval{width:22px;font-size:10px;color:#aaa;text-align:right;flex-shrink:0}
.detail-panel .d-troops{font-size:20px;font-weight:700;margin:4px 0;padding:4px 8px;border-radius:4px;display:inline-block}
.detail-panel .d-troops.player{color:#4fc3f7;background:rgba(79,195,247,.1)}
.detail-panel .d-troops.ai{color:#ef5350;background:rgba(239,83,80,.1)}

.troop-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:100;justify-content:center;align-items:center}
.troop-modal.show{display:flex}
.troop-modal .modal{background:#16213e;border:2px solid #f5a623;border-radius:10px;padding:18px;max-width:340px;width:90%;text-align:center;animation:slideIn .25s}
.troop-modal .modal h2{font-size:15px;color:#f5a623;margin-bottom:2px}
.troop-modal .modal .sub{font-size:11px;color:#aaa;margin-bottom:8px}
.troop-modal .modal .slide-row{display:flex;align-items:center;gap:8px;margin:10px 0}
.troop-modal .modal input[type=range]{flex:1;accent-color:#e94560}
.troop-modal .modal .tv{font-size:18px;font-weight:700;color:#f5a623;min-width:50px}
.battle-log{background:#080818;border:1px solid #1a1a3e;border-radius:4px;padding:5px;max-height:90px;overflow-y:auto;font-size:10px;line-height:1.4}
.battle-log .entry{color:#999;padding:1px 0}
.battle-log .entry.win{color:#4fc3f7}
.battle-log .entry.lose{color:#ef5350}
.battle-log .entry.info{color:#f5a623}
#emptyTip{text-align:center;padding:10px;color:#555;font-size:11px}
.flag-hint{font-size:10px;color:#f5a623;padding:2px 6px;background:rgba(245,166,35,.1);border-radius:3px;margin-bottom:4px;display:inline-block}
#victoryOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;justify-content:center;align-items:center;background:rgba(0,0,0,.7);animation:fadeIn .5s}
#victoryOverlay.show{display:flex}
#victoryOverlay .v-box{text-align:center;animation:vBounce 1s ease-out;padding:40px 60px;border-radius:20px}
#victoryOverlay .v-box.win{background:linear-gradient(135deg,#1a3a1a,#0f4f0f);border:4px solid #4caf50;box-shadow:0 0 80px rgba(76,175,80,.4)}
#victoryOverlay .v-box.lose{background:linear-gradient(135deg,#3a1a1a,#4f0f0f);border:4px solid #e94560;box-shadow:0 0 80px rgba(233,69,96,.4)}
#victoryOverlay .v-icon{font-size:80px;margin-bottom:10px}
#victoryOverlay .v-title{font-size:48px;font-weight:900;color:#fff;text-shadow:0 0 30px currentColor;margin-bottom:8px}
#victoryOverlay .v-title.win{color:#4caf50}
#victoryOverlay .v-title.lose{color:#e94560}
#victoryOverlay .v-sub{font-size:18px;color:#ccc;margin-bottom:20px}
#victoryOverlay .v-mvp{text-align:left;margin:15px 0;padding:15px;background:rgba(0,0,0,.4);border-radius:12px;border:1px solid rgba(255,255,255,.15)}
#victoryOverlay .v-mvp-title{text-align:center;font-size:16px;font-weight:700;color:#f5a623;margin-bottom:10px}
#victoryOverlay .v-mvp-row{display:flex;align-items:center;gap:10px;padding:6px 0}
#victoryOverlay .v-mvp-row .lab{color:#999;font-size:12px;width:70px;flex-shrink:0}
#victoryOverlay .v-mvp-row .val{color:#fff;font-size:14px;font-weight:600}
#victoryOverlay .v-mvp-avatar{width:40px;height:40px;border-radius:50%;border:2px solid #f5a623;flex-shrink:0}
#victoryOverlay .v-mvp-name{font-size:18px;font-weight:700;color:#fff}
#victoryOverlay .v-mvp-meta{font-size:11px;color:#aaa;margin-left:auto;padding-right:4px}
#victoryOverlay .v-btn{padding:10px 30px;font-size:16px;border:none;border-radius:8px;cursor:pointer;font-weight:700;background:#e94560;color:#fff;transition:.2s}
#victoryOverlay .v-btn:hover{transform:scale(1.05)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes vBounce{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.1)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
.troop-summary{display:flex;justify-content:space-between;align-items:center;padding:3px 8px;font-size:12px;background:rgba(0,0,0,.3);border-radius:4px;margin-bottom:4px}
.troop-summary .total-player{color:#4fc3f7}
.troop-summary .total-ai{color:#ef5350}
.troop-summary b{font-size:14px}
.troop-summary .flag-scatter{font-size:11px;padding:0 6px}
.troop-summary .flag-scatter.p{color:#4fc3f7}
.troop-summary .flag-scatter.a{color:#ef5350}
#spectatorGrid .char-card{cursor:pointer}
#spectatorGrid .char-card:hover{border-color:#f5a623;box-shadow:0 0 8px rgba(245,166,35,.3)}
</style>
</head>
<body>

<header>
<h1>⚔ 信长之野望-战国夺旗</h1>
<div class="terrain-select">
<button class="btn btn-xs btn-outline active" id="btnTerrainNormal" onclick="setTerrain('normal')">普通</button>
<button class="btn btn-xs btn-outline" id="btnTerrainNagashino" onclick="setTerrain('nagashino')">长篠</button>
<button class="btn btn-xs btn-outline" id="btnTerrainTennozan" onclick="setTerrain('tennozan')">天王山</button>
</div>
<div class="header-info">
<span class="stat">回合 <b class="round-display" id="roundDisplay">0</b></span>
<span class="stat">📦 牌堆 <b id="drawPileCount">100</b></span>
<span class="stat">🔵 己方  <b class="troop-display player" id="playerTroops">50000</b><span class="inc-tag">+10000/回合</span></span>
<span class="stat">🔴 敌方  <b class="troop-display ai" id="aiTroops">50000</b><span class="inc-tag">+10000/回合</span></span>
</div>
</header>

<div class="container">
<div class="board-wrapper">
<div class="phase-banner" id="phaseBanner">点击「抽卡」开始</div>
<div class="troop-summary"><span class="total-player">🔵 总兵力 <b id="playerTotalTroops">50000</b></span><span class="flag-scatter p" id="pFlagScatter">🚩溃散 0/3</span><span class="flag-scatter a" id="aFlagScatter">🚩溃散 0/3</span><span class="total-ai">🔴 总兵力 <b id="aiTotalTroops">50000</b></span></div>
<div class="board" id="board"><div class="divider"></div></div>
<div style="display:flex;gap:4px;margin-top:5px;flex-wrap:wrap">
<button class="btn btn-gold" id="btnDraw" onclick="drawPhase()">抽卡</button>
<button class="btn btn-small" id="btnAutoPlace" onclick="toggleAutoPlay()">托管</button>
<button class="btn btn-outline btn-small" id="btnEndTurn" onclick="endPlacement()">结束放置</button>
<button class="btn btn-outline btn-small" onclick="resetGame()">重置</button>
</div>
</div>

<div class="right-panel">
<div class="detail-panel" id="detailPanel"></div>

<div class="section">
<div class="sec-hdr"><h3>⚔ 战报</h3><span style="font-size:10px;color:#888" id="phaseHint">-</span></div>
<div class="battle-log" id="battleLog"><div class="entry info">点击「抽卡」开始对局</div></div>
</div>

<div class="section" id="collectionSection">
<div class="sec-hdr">
<h3>🎴 己方武将</h3>
<div class="cat-filters" id="catFilters"></div>
</div>
<div class="col-grid" id="collectionGrid"></div>
<div id="emptyTip">抽卡后武将将显示在这里</div>
</div>

<div class="section">
<div class="sec-hdr">
<h3>👹 敌方武将</h3>
<div class="cat-filters" id="aiCatFilters"></div>
</div>
<div class="col-grid" id="aiCollectionGrid"></div>
<div id="aiEmptyTip" style="text-align:center;padding:8px;color:#555;font-size:11px">-</div>
</div>

<div class="section" id="spectatorSection" style="display:none">
<div class="sec-hdr"><h3>👀 观战席</h3><span id="specHint" style="font-size:10px;color:#888">可招募</span></div>
<div class="col-grid" id="spectatorGrid"></div>
</div>
</div>
</div>

<div class="troop-modal" id="troopModal">
<div class="modal">
<h2 id="tmName">-</h2>
<div class="sub" id="tmSub">统率 99 · 最大兵力 9900</div>
<div class="slide-row">
<span style="font-size:11px;color:#aaa">兵力:</span>
<input type="range" id="troopSlider" min="1" max="10000" value="5000" oninput="updateTroopDisplay()">
<span class="tv" id="troopValue">5000</span>
</div>
<div style="display:flex;gap:6px;justify-content:center;margin-top:4px">
<button class="btn btn-small btn-gold" onclick="confirmPlace()">放置</button>
<button class="btn btn-small btn-outline" onclick="cancelPlace()">取消</button>
</div>
</div>
</div>

<script src="game_data.js"></script>
<script>
// ==================== CONSTANTS ====================
const BOARD_ROWS = 8, BOARD_COLS = 8;
const PLAYER_ROWS = [4,5,6,7], AI_ROWS = [0,1,2,3];
const PLACE_PER_ROUND = 5;
const DRAW_PER_ROUND = 3;
const INIT_DRAW = 10;
const INIT_TROOPS = 50000;
const MAX_TROOPS_PER_UNIT = 10000;
const TROOP_INCOME = 10000;
const MAX_TOTAL_TROOPS = 300000;
let terrainMode = 'normal'; // 'normal' | 'tennozan' | 'nagashino'
const TERRAIN_PATTERNS = {
  normal: new Array(64).fill(true),
  tennozan: (()=>{
    const m = new Array(64).fill(false);
    const actives = [8,6,4,2,2,4,6,8];
    for (let r=0;r<8;r++) {
      const n = actives[r], off = (8-n)/2;
      for (let c=off;c<off+n;c++) m[r*8+c] = true;
    }
    return m;
  })(),
  nagashino: (()=>{
    const m = new Array(64).fill(true);
    // rows 3,4 (0-indexed) only cols 1,2,5,6 active
    for (let c=0;c<8;c++) { if (c!==1&&c!==2&&c!==5&&c!==6) { m[3*8+c]=false; m[4*8+c]=false; } }
    return m;
  })()
};
const MAX_UNITS_PER_SIDE = 20;
function maxUnits() { return terrainMode === 'tennozan' ? 10 : terrainMode === 'nagashino' ? 16 : MAX_UNITS_PER_SIDE; }

function setTerrain(mode) {
  const names = { normal:'普通对战', tennozan:'天王山之战', nagashino:'长篠之战' };
  if (round > 0 || gamePhase !== 'idle') {
    if (!confirm(`切换${names[mode]}模式将重新开始游戏，确认？`)) return;
    terrainMode = mode;
    resetGame();
    return;
  }
  terrainMode = mode;
  document.getElementById('btnTerrainNormal').className = 'btn btn-xs btn-outline' + (mode==='normal'?' active':'');
  document.getElementById('btnTerrainNagashino').className = 'btn btn-xs btn-outline' + (mode==='nagashino'?' active':'');
  document.getElementById('btnTerrainTennozan').className = 'btn btn-xs btn-outline' + (mode==='tennozan'?' active':'');
  renderBoardFull();
}

// ==================== AVATAR ====================
function generateAvatar(char, size) {
  const key = char.id + '-' + size;
  if (avatarCache[key]) return avatarCache[key];
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const r = size / 2;
  const rc = RATING_COLORS[char.rating] || '#555';
  const tc = TYPE_COLORS[char.type] || '#888';
  // Background fill by rating
  ctx.beginPath(); ctx.arc(r,r,r,0,Math.PI*2);
  const grad = ctx.createRadialGradient(r*0.3,r*0.3,0,r*0.8,r*0.8,r);
  grad.addColorStop(0,rc); grad.addColorStop(1,'#0a0a1a');
  ctx.fillStyle=grad; ctx.fill();
  // Crest watermark
  const crest = MON_CRESTS[char.id % MON_CRESTS.length];
  ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.font=Math.round(size*0.26)+'px serif';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(crest,r,r*0.3);
  // Bigger initials
  let initials = char.name.charAt(0);
  if (char.name.length >= 2 && size >= 24) initials = char.name.substring(0, 2);
  ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=Math.max(3, size*0.08);
  ctx.font='bold '+Math.round(size*0.4)+'px "Microsoft YaHei",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(initials,r,r+r*0.22);
  ctx.shadowBlur=0;
  // Border by type color
  const bw = Math.max(2, size*0.06);
  ctx.beginPath(); ctx.arc(r,r,r-bw/2,0,Math.PI*2);
  ctx.strokeStyle=tc; ctx.lineWidth=bw; ctx.stroke();
  // Rating badge
  if (size>=26&&char.rating) {
    const bx=r+r*0.7,by=r+r*0.7,br=Math.max(5,size*0.08);
    ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fillStyle='#1a1a2e'; ctx.fill();
    ctx.beginPath(); ctx.arc(bx,by,br-1,0,Math.PI*2); ctx.strokeStyle=rc; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(br*0.8)+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(char.rating,bx,by+1);
  }
  avatarCache[key]=c.toDataURL();
  return avatarCache[key];
}

// ==================== COMBAT ====================
function getNeighborIndices(i) {
  const r = rowOf(i), c = colOf(i), res = [];
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++)
      if (dr!==0||dc!==0) { const nr=r+dr,nc=c+dc; if (inRange(nr,nc)) res.push(idx(nr,nc)); }
  return res;
}

function getConeIndices(i, isPlayer) {
  const r = rowOf(i), c = colOf(i);
  const dir = isPlayer ? -1 : 1;
  const res = [];
  for (let dc = -1; dc <= 1; dc++) { const nr=r+dir,nc=c+dc; if (inRange(nr,nc)) res.push(idx(nr,nc)); }
  for (let dc = -2; dc <= 2; dc++) { const nr=r+dir*2,nc=c+dc; if (inRange(nr,nc)) res.push(idx(nr,nc)); }
  return res;
}

function isFlagUnit(idx, isPlayer) {
  return isPlayer ? player.flagIdx === idx : ai.flagIdx === idx;
}

function calcPower(index, isPlayer) {
  const myBoard = isPlayer ? player.board : ai.board;
  const enBoard = isPlayer ? ai.board : player.board;
  const u = myBoard[index];
  if (!u) return 0;
  const flagMul = isFlagUnit(index, isPlayer) ? 1.1 : 1;
  let power = u.char.martial * 2 * flagMul;
  // Troops amplify power (reduced impact)
  power *= (1 + u.troops / 30000);
  // 统帅: friendly leadership in 3×3 (self + 8 neighbors)
  getNeighborIndices(index).forEach(ni => { const nu = myBoard[ni]; if (nu) power += nu.char.leadership * 0.05; });
  power += u.char.leadership * flagMul * 0.05;
  // 智力: enemies whose cone covers this unit reduce its power
  for (let ei=0;ei<64;ei++) {
    const eu = enBoard[ei];
    if (!eu) continue;
    const cone = getConeIndices(ei, !isPlayer);
    if (cone.indexOf(index) >= 0) power -= eu.char.intelligence * 0.03;
  }
  return Math.max(1, Math.round(power));
}

// Battle loss calculator — returns {pLoss,aLoss,pLossPct,aLossPct}
// winner = side with smaller lossPct
function calcBattle(pUnit, aUnit, pPower, aPower, ratio) {
  const pComm=pUnit.troops*ratio, aComm=aUnit.troops*ratio;
  const pPol = pUnit.char.politics * (isFlagUnit(player.flagIdx, true) ? 1.1 : 1);
  const aPol = aUnit.char.politics * (isFlagUnit(ai.flagIdx, false) ? 1.1 : 1);
  const pRed=1-pPol/240, aRed=1-aPol/240;
  const total=pPower+aPower;
  const pLoss=Math.round(pComm*(aPower/total)*0.8*pRed);
  const aLoss=Math.round(aComm*(pPower/total)*0.8*aRed);
  return { pLoss, aLoss, pLossPct:pLoss/(pUnit.troops*ratio), aLossPct:aLoss/(aUnit.troops*ratio) };
}

function calcRangedDamage(attacker, defender, atkPower, defPower) {
  const total = atkPower + defPower;
  const intelFactor = attacker.char.intelligence / 100;
  const dmg = Math.round(attacker.troops * (atkPower / total) * intelFactor * 0.25);
  return Math.max(1, dmg);
}

// Check if target cell is behind an enemy line (enemy between target and own baseline)
function isBehindEnemyLine(idx, isPlayer) {
  const r=rowOf(idx), c=colOf(idx);
  const enBoard=isPlayer?ai.board:player.board;
  // Player: if AI exists BELOW target (row > r), the target is behind AI lines → block
  if (isPlayer) { for (let rr=r+1;rr<8;rr++) if (enBoard[rr*8+c]) return true; }
  // AI: if player exists ABOVE target (row < r), the target is behind player lines → block
  else { for (let rr=r-1;rr>=0;rr--) if (enBoard[rr*8+c]) return true; }
  return false;
}

// Check triple encirclement: front + left + right all have enemies
function hasAdjacentEnemy(idx, isPlayer) {
  const r=rowOf(idx), c=colOf(idx);
  const enemy=isPlayer?ai:player;
  for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
    if (dr===0&&dc===0) continue;
    const nr=r+dr, nc=c+dc;
    if (nr<0||nr>7||nc<0||nc>7) continue;
    if (enemy.board[nr*8+nc]) return true;
  }
  return false;
}
function pinFromPlacement(idx, isPlayer) {
  const side=isPlayer?player:ai, enemy=isPlayer?ai:player;
  let adj=false;
  const r=rowOf(idx), c=colOf(idx);
  for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
    if (dr===0&&dc===0) continue;
    const nr=r+dr, nc=c+dc;
    if (nr<0||nr>7||nc<0||nc>7) continue;
    if (enemy.board[nr*8+nc]) { adj=true; enemy.board[nr*8+nc].pinned=true; }
  }
  if (adj) side.board[idx].pinned=true;
}
function isTripleSurrounded(idx, isPlayer) {
  const r=rowOf(idx), c=colOf(idx);
  const enBoard=isPlayer?ai.board:player.board;
  const hasFront=isPlayer?(r>0&&enBoard[(r-1)*8+c]):(r<7&&enBoard[(r+1)*8+c]);
  const hasLeft=c>0&&enBoard[r*8+(c-1)];
  const hasRight=c<7&&enBoard[r*8+(c+1)];
  return hasFront&&hasLeft&&hasRight;
}
// Check if enemy at idx is triple-surrounded by player units
function isTripleSurroundingEnemy(idx) {
  return isTripleSurrounded(idx, false);
}
// Battle power modifier: triple-surrounded → -10%; surrounding a triple-surrounded enemy → +5% per surrounding unit
function getEncirclementPowerMod(idx, isPlayer) {
  const r=rowOf(idx), c=colOf(idx);
  for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
    const nr=r+dr, nc=c+dc;
    if (nr<0||nr>7||nc<0||nc>7) continue;
    if (isTripleSurrounded(nr*8+nc,true)||isTripleSurrounded(nr*8+nc,false)) return 0.9;
  }
  return 1;
}
function calcBattlePower(idx, isPlayer) {
  return Math.round(calcPower(idx, isPlayer) * getEncirclementPowerMod(idx, isPlayer));
}

// ==================== TURN FLOW ====================
function shuffle(arr) { for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} }

function resetGame() {
  drawPile = CHARACTERS.map(c => ({...c}));
  shuffle(drawPile);
  player = { collection: [], board: Array(64).fill(null), troops: INIT_TROOPS, placed: 0, flagIdx: -1 };
  ai = { collection: [], board: Array(64).fill(null), troops: INIT_TROOPS, placed: 0, flagIdx: -1 };
  round = 0; gamePhase = 'idle'; selectedChar = null; selectedCell = null; placedThisTurn = 0;
  document.getElementById('battleLog').innerHTML = '<div class="entry info">点击「抽卡」开始对局</div>';
  document.getElementById('roundDisplay').textContent = '0';
  document.getElementById('drawPileCount').textContent = drawPile.length;
  document.getElementById('detailPanel').className = 'detail-panel';
  playerCatFilter = 'all'; aiCatFilter = 'all';
  scatterCount = {}; deadList = []; flagScatterCount = { player: 0, ai: 0 }; spectatorPool = []; initCombatStats();
  updateFlagScatterUI();
  setPhase('点击「抽卡」开始'); renderBoardFull(); updateUI();
  document.getElementById('btnDraw').disabled = false;
  document.getElementById('btnEndTurn').disabled = false;
  document.getElementById('btnAutoPlace').disabled = false;
  initFilters();
}

function drawPhase() {
  expireCooldowns();
  if (gamePhase === 'idle' || gamePhase === 'draw') {
    const count = round === 0 ? INIT_DRAW : DRAW_PER_ROUND;
    if (drawPile.length <= 0) {
      round++; placedThisTurn = 0; selectedChar = null; selectedCell = null;
      let pi=0, aInc=0;
      if (round > 1) { pi=decayIncome(player); aInc=decayIncome(ai); player.troops += pi; ai.troops += aInc; }
      document.getElementById('roundDisplay').textContent = round;
      document.getElementById('drawPileCount').textContent = drawPile.length;
      gamePhase = 'place_player';
      addBattleLog(`第${round}回合 · 牌堆已空，直接放置${round>1?`（各获${pi}/${aInc}兵力）`:''}`,'info');
      updateUI();
      setPhase(`第${round}回合 · 放置武将(0/${PLACE_PER_ROUND})`);
      renderBoardFull();
      document.getElementById('btnDraw').disabled = true;
      return;
    }
    const actual = Math.min(count, drawPile.length);
    const pc = drawPile.splice(0, actual);
    pc.forEach(c => player.collection.push(c));
    const ac = Math.min(actual, drawPile.length);
    const acArr = drawPile.splice(0, ac);
    acArr.forEach(c => ai.collection.push(c));
    // Draw 2 into spectator pool (not on round 0)
    if (round > 0 && drawPile.length > 0) {
      const specCount = Math.min(2, drawPile.length);
      const specArr = drawPile.splice(0, specCount);
      specArr.forEach(c => spectatorPool.push(c));
      addBattleLog(`👀 观战席新增${specArr.length}名武将：${specArr.map(c=>c.name).join('、')}`,'info');
      tryRecruitAI();
    }
    round++; placedThisTurn = 0; selectedChar = null; selectedCell = null;

    // Income
    let pi=0, aInc=0;
    if (round > 1) { pi=decayIncome(player); aInc=decayIncome(ai); player.troops += pi; ai.troops += aInc; }

    document.getElementById('roundDisplay').textContent = round;
    document.getElementById('drawPileCount').textContent = drawPile.length;
    gamePhase = 'place_player';
    addBattleLog(`第${round}回合 · 抽${pc.length}张，敌方抽${acArr.length}张${round>1?`，各获${pi}/${aInc}兵力`:''}`,'info');
    updateUI();
    setPhase(`第${round}回合 · 放置武将(0/${PLACE_PER_ROUND})`);
    renderBoardFull();
    document.getElementById('btnDraw').disabled = true;
  }
}

function onCellClick(index) {
  const u = getUnit(index);
  if (!u) {
    if (gamePhase === 'place_player' && placedThisTurn < PLACE_PER_ROUND && PLAYER_ROWS.includes(rowOf(index))) {
      if (!isActiveCell(index)) { setPhase('❌ 此格不可用'); return; }
      if (player.board.filter(u=>u).length >= maxUnits()) { setPhase('❌ 已达上限'+maxUnits()+'名武将'); return; }
      if (isBehindEnemyLine(index, true)) { setPhase('❌ 不可放置在敌方棋子后方'); return; }
      if (selectedChar) { selectedCell = index; showTroopModal(selectedChar, index); }
      else setPhase('请在下方武将册中选择一名武将');
    }
    return;
  }
  showDetailUnit(u, isPlayerUnit(index), index);
  selectedCell = index;
  renderBoardFull();
}

function onRightClick(index) {
  if (gamePhase !== 'place_player') return;
  if (!isPlayerUnit(index)) return;
  const u = player.board[index];
  if (!u) return;
  const wasFlag = player.flagIdx === index;
  player.board[index] = null;
  player.troops += u.troops;
  placedThisTurn = Math.max(0, placedThisTurn - 1);
  if (wasFlag) player.flagIdx = -1;
  addBattleLog(`收回 ${u.char.name}`,'info');
  renderBoardFull(); updateUI();
  setPhase(`第${round}回合 · 放置(${placedThisTurn}/${PLACE_PER_ROUND})`);
  document.getElementById('detailPanel').className = 'detail-panel';
}

function showTroopModal(char, cellIdx) {

  document.getElementById('tmSub').textContent = `统率 ${char.leadership} · 最大 ${Math.min(MAX_TROOPS_PER_UNIT, char.leadership*100)}`;
  const slider = document.getElementById('troopSlider');
  slider.max = Math.max(1, maxT); slider.min = 1;
  slider.value = Math.min(5000, maxT);
  updateTroopDisplay();
  document.getElementById('troopModal').classList.add('show');
}

function updateTroopDisplay() {
  document.getElementById('troopValue').textContent = parseInt(document.getElementById('troopSlider').value);
}

function confirmPlace() {
  if (!pendingChar||pendingCell<0) return;
  const troops = parseInt(document.getElementById('troopSlider').value);
  if (troops > player.troops) { addBattleLog('兵力不足！','lose'); return; }
  if (getUnit(pendingCell)) { cancelPlace(); return; }
  if (!isActiveCell(pendingCell)) { addBattleLog('此格不可用！','lose'); cancelPlace(); return; }
  if (player.board.some(u=>u&&u.char.id===pendingChar.id) || ai.board.some(u=>u&&u.char.id===pendingChar.id)) {
    addBattleLog('该武将已在棋盘上！','lose'); cancelPlace(); return;
  }
  if (isBehindEnemyLine(pendingCell, true)) {
    addBattleLog('不可放置在敌方棋子后方！','lose'); cancelPlace(); return;
  }
  const wasNoFlag = player.flagIdx < 0;
  player.board[pendingCell] = { char: pendingChar, troops, uid: ++unitIdCounter };
  pinFromPlacement(pendingCell, true);
  player.troops -= troops; placedThisTurn++;
  if (!player.board.some((u,i)=>u&&player.flagIdx===i)) player.flagIdx = pendingCell;
  const isFlag = player.flagIdx === pendingCell;
  addBattleLog(`放置 ${pendingChar.name} 🪖${troops}${isFlag?' 🚩旗手':''}`,'win');
  document.getElementById('troopModal').classList.remove('show');
  pendingChar=null; pendingCell=-1;
  renderBoardFull(); updateUI();
  if (placedThisTurn >= PLACE_PER_ROUND) endPlacement();
  else setPhase(`第${round}回合 · 放置(${placedThisTurn}/${PLACE_PER_ROUND})`);
  updateCollectionGrid();
}

function cancelPlace() {
  document.getElementById('troopModal').classList.remove('show');
  pendingChar=null; pendingCell=-1;
}

function autoPlaceRemaining() {
  if (gamePhase !== 'place_player') return;
  const prevCount = player.board.filter(u=>u).length;
  autoPlaceSide(player, player.collection, PLAYER_ROWS, true, PLACE_PER_ROUND - placedThisTurn);
  const placed = player.board.filter(u=>u).length - prevCount;
  if (placed > 0) {
    placedThisTurn += placed;
    addBattleLog(`自动放置${placed}名武将`,'info');
  }
  const hasFlag = player.board.some((u,i)=>u&&player.flagIdx===i);
  if (!hasFlag) {
    const first = player.board.findIndex(u=>u);
    if (first >= 0) player.flagIdx = first;
  }
  renderBoardFull(); updateUI();
  const noMoreAvail = !player.collection.some(c => !player.board.some(u=>u&&u.char.id===c.id) && !ai.board.some(u=>u&&u.char.id===c.id) && !isOnCooldown(c.id, true));
  if (placedThisTurn >= PLACE_PER_ROUND || placed === 0 || noMoreAvail) endPlacement();
  else setPhase(`第${round}回合 · 放置(${placedThisTurn}/${PLACE_PER_ROUND})`);
}

function toggleAutoPlay() {
  autoPlay = !autoPlay;
  if (autoPlay) {
    document.getElementById('btnAutoPlace').textContent = '⚡自动中';
    document.getElementById('btnAutoPlace').className = 'btn btn-small active';
    document.getElementById('btnDraw').disabled = true;
    document.getElementById('btnEndTurn').disabled = true;
    runAutoPlay();
  } else {
    document.getElementById('btnAutoPlace').textContent = '托管';
    document.getElementById('btnAutoPlace').className = 'btn btn-small';
    if (gamePhase === 'idle' || gamePhase === 'draw') {
      document.getElementById('btnDraw').disabled = false;
    } else if (gamePhase === 'place_player') {
      document.getElementById('btnEndTurn').disabled = false;
    }
  }
}

function runAutoPlay() {
  if (!autoPlay) return;
  if (gamePhase === 'gameover') { autoPlay = false; return; }
  if (gamePhase === 'idle' || gamePhase === 'draw') {
    drawPhase();
    if (autoPlay) setTimeout(runAutoPlay, 100);
  } else if (gamePhase === 'place_player') {
    autoPlaceRemaining();
    if (autoPlay) setTimeout(runAutoPlay, gamePhase === 'place_player' ? 100 : 500);
  } else if (gamePhase === 'place_ai' || gamePhase === 'battle') {
    setTimeout(runAutoPlay, 500);
  }
}

function endPlacement() {
  if (gamePhase !== 'place_player') return;
  if (!player.board.some((u,i)=>u&&player.flagIdx===i)) {
    // Force-set flag if not set
    const first = player.board.findIndex(u => u);
    if (first >= 0) { player.flagIdx = first; addBattleLog(`${player.board[first].char.name} 被指定为旗手🚩`,'info'); }
    else { addBattleLog('请至少放置一名武将！','lose'); return; }
  }
  gamePhase = 'place_ai';
  setPhase('敌方放置中...');
  document.getElementById('btnEndTurn').disabled = true;
  document.getElementById('btnAutoPlace').disabled = true;
  setTimeout(() => aiPlacement(), 300);
}

function autoPlaceSide(side, collection, rows, isPlayer, maxPlace) {
  if (maxPlace === undefined) maxPlace = PLACE_PER_ROUND;
  const ratingOrder={ 'S+':0,'S':1,'A':2,'B':3,'C':4,'D':5, 's+':0,'s':1,'a':2,'b':3,'c':4,'d':5 };
  const avail = collection
    .filter(c => !player.board.some(u=>u&&u.char.id===c.id) && !ai.board.some(u=>u&&u.char.id===c.id) && !isOnCooldown(c.id, isPlayer) && !isDead(c.id))
    .sort((a,b) => (ratingOrder[a.rating]??9) - (ratingOrder[b.rating]??9));
  const remainSlots = maxUnits() - side.board.filter(u=>u).length;
  const toPlace = Math.min(maxPlace, avail.length, remainSlots);
  if (!toPlace) return;
  // Separate empty cells: front (rows closer to enemy) and back, skip behind-enemy-line
  const frontCut = isPlayer ? 6 : 2;
  const frontCells=[], backCells=[];
  for (const r of rows) for (let c=0;c<BOARD_COLS;c++) {
    const i=idx(r,c);
    if (getUnit(i) || isBehindEnemyLine(i, isPlayer) || !isActiveCell(i)) continue;
    if (isPlayer ? r < frontCut : r >= frontCut) frontCells.push(i); else backCells.push(i);
  }
  shuffle(frontCells); shuffle(backCells);
  const dir = isPlayer ? -1 : 1;
  const supportPreferred=[];
  let placed=0;
  for (const ch of avail) {
    if (placed>=toPlace) break;
    const combat=ch.leadership+ch.martial, support=ch.intelligence+ch.politics;
    let cell;
      if (combat>=support) {
        if (frontCells.length) {
          cell=frontCells.pop();
          const behind=rowOf(cell)+dir;
          if (behind>=0&&behind<8) { const bi=behind*8+colOf(cell); if (isActiveCell(bi)) supportPreferred.push(bi); }
        } else if (supportPreferred.length) {
          cell=supportPreferred.shift();
          const bi=backCells.indexOf(cell);
          if (bi>=0) backCells.splice(bi,1);
        } else if (backCells.length) cell=backCells.pop();
        else break;
      } else {
        let found=false;
        while (supportPreferred.length) {
          const c=supportPreferred.shift();
          if (!getUnit(c) && isActiveCell(c) && backCells.includes(c)) {
          cell=c; found=true;
          const bi=backCells.indexOf(c);
          if (bi>=0) backCells.splice(bi,1);
          break;
        }
      }
      if (!found && backCells.length) cell=backCells.pop();
      else if (!found && frontCells.length) cell=frontCells.pop();
      else if (!found) break;
    }
    const maxT=Math.min(MAX_TROOPS_PER_UNIT, ch.leadership*100, side.troops);
    const t=Math.max(500, Math.min(maxT, Math.round(ch.martial*60+ch.leadership*40)));
    side.board[cell]={ char:ch, troops:t, uid:++unitIdCounter };
    pinFromPlacement(cell, isPlayer);
    side.troops=Math.max(0, side.troops-t); placed++;
  }
}

function aiPlacement() {
  autoPlaceSide(ai, ai.collection, AI_ROWS, false);
  endAiPlace();
}
function endAiPlace() {
  if (!ai.board.some((u,i)=>u&&ai.flagIdx===i)) {
    const first=findHighestTroopsIdx(ai.board);
    if (first>=0) ai.flagIdx=first;
  }
  addBattleLog(`敌方放置完成`,'info');
  renderBoardFull(); updateUI();
  setTimeout(() => advancePhase(), 400);
}

// ==================== ADVANCE & BATTLE ====================
function areAdjacent(i1, i2) {
  if (i1 < 0 || i2 < 0) return false;
  const r1=rowOf(i1),c1=colOf(i1),r2=rowOf(i2),c2=colOf(i2);
  return Math.abs(r1-r2) <= 1 && Math.abs(c1-c2) <= 1 && !(r1===r2&&c1===c2);
}

function advancePhase() {
  gamePhase = 'battle';
  setPhase('⚔ 推进中...');

  const pFlagUnit = player.flagIdx >= 0 ? player.board[player.flagIdx] : null;
  const aFlagUnit = ai.flagIdx >= 0 ? ai.board[ai.flagIdx] : null;
  const allRes = [];

  // Clear pinned only for units whose adjacent enemy is gone
  for (let i=0;i<64;i++) {
    if (player.board[i] && player.board[i].pinned && !hasAdjacentEnemy(i,true)) player.board[i].pinned = false;
    if (ai.board[i] && ai.board[i].pinned && !hasAdjacentEnemy(i,false)) ai.board[i].pinned = false;
  }

  // Save initial troops for heal cap (60% of damage)
  const initTroopsByUid = {};
  for (let i=0;i<64;i++) {
    if (player.board[i]) initTroopsByUid[player.board[i].uid]=player.board[i].troops;
    if (ai.board[i]) initTroopsByUid[ai.board[i].uid]=ai.board[i].troops;
  }

  // --- Step 1: Determine movement & engagements per unit ---
  // Rules:
  //   cell1 empty & cell2 empty/friendly → advance 1
  //   cell1 empty & cell2 enemy → gap battle, winner advances, loser stays
  //   cell1 friendly → blocked, stay
  //   cell1 enemy → adjacent battle, both stay (对峙)
  const pMoves=[], aMoves=[];
  const engagedP = new Set(), engagedA = new Set();
  const gapBattles = []; // {pIdx, aIdx, gapIdx}
  const adjPairs = [];  // {pIdx, aIdx}
  const rangedAttacks = []; // {attackerIdx, targetIdx, isPlayer}

  for (let i=0;i<64;i++) {
    if (player.board[i]) {
      const r=rowOf(i), c=colOf(i);
      const e1=r>0?ai.board[(r-1)*8+c]:null, f1=r>0?player.board[(r-1)*8+c]:null;
      const e2=r>1?ai.board[(r-2)*8+c]:null;
      if (e1) { engagedP.add(i); adjPairs.push({pIdx:i, aIdx:(r-1)*8+c}); }
      else if (f1) {
        engagedP.add(i);
        if (e2) rangedAttacks.push({attackerIdx:i, targetIdx:(r-2)*8+c, isPlayer:true});
      }
      else if (e2) { engagedP.add(i); gapBattles.push({pIdx:i, aIdx:(r-2)*8+c, gapIdx:(r-1)*8+c}); }
    }
    if (ai.board[i]) {
      const r=rowOf(i), c=colOf(i);
      const e1=r<7?player.board[(r+1)*8+c]:null, f1=r<7?ai.board[(r+1)*8+c]:null;
      const e2=r<6?player.board[(r+2)*8+c]:null;
      if (e1) { engagedA.add(i); if(!adjPairs.some(p=>p.aIdx===i)) adjPairs.push({pIdx:(r+1)*8+c, aIdx:i}); }
      else if (f1) {
        engagedA.add(i);
        if (e2) rangedAttacks.push({attackerIdx:i, targetIdx:(r+2)*8+c, isPlayer:false});
      }
      else if (e2) { engagedA.add(i); if(!gapBattles.some(g=>g.aIdx===i)) gapBattles.push({pIdx:(r+2)*8+c, aIdx:i, gapIdx:(r+1)*8+c}); }
    }
  }

  // Pinned units stay
  for (let i=0;i<64;i++) {
    if (player.board[i]&&player.board[i].pinned) engagedP.add(i);
    if (ai.board[i]&&ai.board[i].pinned) engagedA.add(i);
  }

  // Movement: engaged units stay. Non-engaged: priority-based (straight → left-forward → right-forward)
  // Higher troops (then combat power) gets priority when multiple units target same cell
  const pDesires = [], aDesires = [];
  for (let i=0;i<64;i++) {
    if (player.board[i]&&!engagedP.has(i)) {
      const r=rowOf(i), c=colOf(i), cand=[];
      if (r>0) { cand.push(idx(r-1,c)); if (c>0) cand.push(idx(r-1,c-1)); if (c<7) cand.push(idx(r-1,c+1)); }
      const ac = cand.filter(ci=>isActiveCell(ci));
      const u=player.board[i];
      pDesires.push({idx:i, unit:u, troops:u.troops, power:u.char.martial+u.char.leadership, candidates:ac});
    }
    if (ai.board[i]&&!engagedA.has(i)) {
      const r=rowOf(i), c=colOf(i), cand=[];
      if (r<7) { cand.push(idx(r+1,c)); if (c>0) cand.push(idx(r+1,c-1)); if (c<7) cand.push(idx(r+1,c+1)); }
      const ac = cand.filter(ci=>isActiveCell(ci));
      const u=ai.board[i];
      aDesires.push({idx:i, unit:u, troops:u.troops, power:u.char.martial+u.char.leadership, candidates:ac});
    }
  }
  pDesires.sort((a,b)=>b.troops-a.troops||b.power-a.power);
  aDesires.sort((a,b)=>b.troops-a.troops||b.power-a.power);
  const pClaimed = new Set(), aClaimed = new Set();
  for (const d of pDesires) {
    let t=d.idx;
    for (const ci of d.candidates) { if (!pClaimed.has(ci)) { t=ci; pClaimed.add(ci); break; } }
    pMoves.push({from:d.idx, to:t, unit:d.unit});
  }
  for (const d of aDesires) {
    let t=d.idx;
    for (const ci of d.candidates) { if (!aClaimed.has(ci)) { t=ci; aClaimed.add(ci); break; } }
    aMoves.push({from:d.idx, to:t, unit:d.unit});
  }
  for (let i=0;i<64;i++) {
    if (player.board[i]&&engagedP.has(i)) pMoves.push({from:i, to:i, unit:player.board[i]});
    if (ai.board[i]&&engagedA.has(i)) aMoves.push({from:i, to:i, unit:ai.board[i]});
  }

  // --- Step 2: Apply movement ---
  for (let i=0;i<64;i++){player.board[i]=null;ai.board[i]=null;}
  pMoves.forEach(m=>player.board[m.to]=m.unit);
  aMoves.forEach(m=>ai.board[m.to]=m.unit);

  // --- Step 3: Resolve GAP battles first (winner advances to gap) ---
  const frontDone = new Set();
  const fbattles = [];

  gapBattles.forEach(g=>{
    const pu=player.board[g.pIdx], au=ai.board[g.aIdx];
    if (!pu||!au) return;
    const pPower=calcBattlePower(g.pIdx,true), aPower=calcBattlePower(g.aIdx,false);
    const pn=pu.char.name, an=au.char.name;
    const pFull=pu.troops, aFull=au.troops;
    const {pLoss,aLoss,pLossPct,aLossPct}=calcBattle(pu,au,pPower,aPower,1);
    pu.troops=Math.max(0,pu.troops-pLoss); au.troops=Math.max(0,au.troops-aLoss);
    if (pLoss>0) recordMelee(au.uid, pLoss);
    if (aLoss>0) recordMelee(pu.uid, aLoss);
    const pAlive=pu.troops>0, aAlive=au.troops>0;
    if (!pAlive) { markCooldown(pu.char.id,true); recordKill(au.uid); }
    if (!aAlive) { markCooldown(au.char.id,false); recordKill(pu.uid); }
    // Defeated (troops=0) enemy allows advance; both alive → 损失少者前进 (only if gap cell active)
    let adv = '';
    if (!isActiveCell(g.gapIdx)) { /* gap inactive → both stay */ }
    else if (pAlive&&!aAlive) { player.board[g.gapIdx]=pu; player.board[g.pIdx]=null; adv=pn; }
    else if (!pAlive&&aAlive) { ai.board[g.gapIdx]=au; ai.board[g.aIdx]=null; adv=an; }
    else if (pAlive&&aAlive) {
      if (pLossPct < aLossPct) { player.board[g.gapIdx]=pu; player.board[g.pIdx]=null; adv=pn; }
      else if (aLossPct < pLossPct) { ai.board[g.gapIdx]=au; ai.board[g.aIdx]=null; adv=an; }
    }
    frontDone.add(g.pIdx); frontDone.add(g.aIdx);
    const pTag = pPower > aPower ? '优' : (pPower < aPower ? '劣' : '均');
    const aTag = aPower > pPower ? '优' : (aPower < pPower ? '劣' : '均');
    allRes.push(`[前激战] ${pAlive?pn:'💀'+pn}(${pTag})(损${pLossPct*100|0}%) ${pFull}→${pu.troops}[-${pLoss}] ⚔ ${aAlive?an:'💀'+an}(${aTag})(损${aLossPct*100|0}%) ${aFull}→${au.troops}[-${aLoss}]`+(adv?` → ${adv}推进`:' → 对峙'));
  });

  // --- Step 3b: Resolve RANGED attacks (friendly 1-ahead, enemy 2-ahead) ---
  rangedAttacks.forEach(r=>{
    const attacker=r.isPlayer?player.board[r.attackerIdx]:ai.board[r.attackerIdx];
    const defender=r.isPlayer?ai.board[r.targetIdx]:player.board[r.targetIdx];
    if (!attacker||!defender) return;
    const aPower=calcBattlePower(r.attackerIdx,r.isPlayer);
    const dPower=calcBattlePower(r.targetIdx,!r.isPlayer);
    const an=attacker.char.name, dn=defender.char.name;
    const aFull=attacker.troops, dFull=defender.troops;
    const damage = calcRangedDamage(attacker, defender, aPower, dPower);
    defender.troops = Math.max(0, defender.troops - damage);
    if (damage>0) recordRanged(attacker.uid, damage);
    const dAlive = defender.troops > 0;
    if (!dAlive) { markCooldown(defender.char.id, !r.isPlayer); recordKill(attacker.uid); }
    const pct = dFull>0 ? Math.round(damage/dFull*100) : 0;
    allRes.push(`[远程] ${an} → ${dn} 射伤${damage}(${pct}%)${dAlive?` ${dFull}→${defender.troops}`:' 💀击毙'}`);
  });

  // --- Step 4: Resolve ADJACENT battles post-move ---
  // Scan new board for same-cell + adjacent-row confrontations not yet processed
  // Same cell
  for (let i=0;i<64;i++) {
    const pu=player.board[i], au=ai.board[i];
    if (!pu||!au||frontDone.has(i)) continue;
    const pPower=calcBattlePower(i,true), aPower=calcBattlePower(i,false);
    const pn=pu.char.name, an=au.char.name;
    const pFull=pu.troops, aFull=au.troops;
    const {pLoss,aLoss,pLossPct,aLossPct}=calcBattle(pu,au,pPower,aPower,1);
    const w = pLossPct < aLossPct ? pn : (aLossPct < pLossPct ? an : '平');
    pu.troops=Math.max(0,pu.troops-pLoss); au.troops=Math.max(0,au.troops-aLoss);
    if (pLoss>0) recordMelee(au.uid, pLoss);
    if (aLoss>0) recordMelee(pu.uid, aLoss);
    const pAlive=pu.troops>0, aAlive=au.troops>0;
    if (!pAlive) { markCooldown(pu.char.id,true); recordKill(au.uid); }
    if (!aAlive) { markCooldown(au.char.id,false); recordKill(pu.uid); }
    if (pAlive) player.board[i]=pu; else player.board[i]=null;
    if (aAlive) ai.board[i]=au; else ai.board[i]=null;
    const pTag2 = pPower > aPower ? '优' : (pPower < aPower ? '劣' : '均');
    const aTag2 = aPower > pPower ? '优' : (aPower < pPower ? '劣' : '均');
    if (pAlive&&aAlive){pu.pinned=true;au.pinned=true;allRes.push(`[前对峙] ${pn}(${pTag2})(损${pLossPct*100|0}%) ${pFull}→${pu.troops}[-${pLoss}] ⚔ ${an}(${aTag2})(损${aLossPct*100|0}%) ${aFull}→${au.troops}[-${aLoss}]`);}
    else if (pAlive&&!aAlive) allRes.push(`[前胜] ${pn}(${pTag2})(损${pLossPct*100|0}%) ${pFull}→${pu.troops}[-${pLoss}] 击败 💀${an}(${aTag2})(损100%) ${aFull}→0[-${aLoss}]`);
    else if (!pAlive&&aAlive) allRes.push(`[前败] 💀${pn}(${pTag2})(损100%) ${pFull}→0[-${pLoss}] 被 ${an}(${aTag2})(损${aLossPct*100|0}%) ${aFull}→${au.troops}[-${aLoss}] 击败`);
    else allRes.push(`[前同尽] 💀${pn}(损100%) ${pFull}→0[-${pLoss}] ⚔ 💀${an}(损100%) ${aFull}→0[-${aLoss}]`);
    frontDone.add(i);
  }
  // Adjacent rows, same column (scan all)
  for (let c=0;c<8;c++) for (let r=1;r<8;r++) {
    const pIdx=r*8+c, aIdx=(r-1)*8+c;
    if (frontDone.has(pIdx)||frontDone.has(aIdx)) continue;
    const pu=player.board[pIdx], au=ai.board[aIdx];
    if (!pu||!au) continue;
    const pPower=calcBattlePower(pIdx,true), aPower=calcBattlePower(aIdx,false);
    const pn=pu.char.name, an=au.char.name;
    const pFull=pu.troops, aFull=au.troops;
    const {pLoss,aLoss,pLossPct,aLossPct}=calcBattle(pu,au,pPower,aPower,1);
    const w = pLossPct < aLossPct ? pn : (aLossPct < pLossPct ? an : '平');
    pu.troops=Math.max(0,pu.troops-pLoss); au.troops=Math.max(0,au.troops-aLoss);
    if (pLoss>0) recordMelee(au.uid, pLoss);
    if (aLoss>0) recordMelee(pu.uid, aLoss);
    const pAlive=pu.troops>0, aAlive=au.troops>0;
    if (!pAlive) { markCooldown(pu.char.id,true); recordKill(au.uid); }
    if (!aAlive) { markCooldown(au.char.id,false); recordKill(pu.uid); }
    if (pAlive) player.board[pIdx]=pu; else player.board[pIdx]=null;
    if (aAlive) ai.board[aIdx]=au; else ai.board[aIdx]=null;
    const pTag3 = pPower > aPower ? '优' : (pPower < aPower ? '劣' : '均');
    const aTag3 = aPower > pPower ? '优' : (aPower < pPower ? '劣' : '均');
    if (pAlive&&aAlive){pu.pinned=true;au.pinned=true;allRes.push(`[前对峙] ${pn}(${pTag3})(损${pLossPct*100|0}%) ${pFull}→${pu.troops}[-${pLoss}] ⚔ ${an}(${aTag3})(损${aLossPct*100|0}%) ${aFull}→${au.troops}[-${aLoss}]`);}
    else if (pAlive&&!aAlive) allRes.push(`[前胜] ${pn}(${pTag3})(损${pLossPct*100|0}%) ${pFull}→${pu.troops}[-${pLoss}] 击败 💀${an}(${aTag3})(损100%) ${aFull}→0[-${aLoss}]`);
    else if (!pAlive&&aAlive) allRes.push(`[前败] 💀${pn}(${pTag3})(损100%) ${pFull}→0[-${pLoss}] 被 ${an}(${aTag3})(损${aLossPct*100|0}%) ${aFull}→${au.troops}[-${aLoss}] 击败`);
    else allRes.push(`[前同尽] 💀${pn}(损100%) ${pFull}→0[-${pLoss}] ⚔ 💀${an}(损100%) ${aFull}→0[-${aLoss}]`);
    frontDone.add(pIdx); frontDone.add(aIdx);
  }

  // Step 5: resolve SIDE battles (50% troops) — units still alive
  const sbattles = [];
  const sideDone = new Set();
  for (let r=0;r<8;r++) for (let c=0;c<7;c++) {
    const lIdx = r*8+c, rIdx = r*8+(c+1); // left col, right col
    const pu = player.board[lIdx], au = ai.board[rIdx];
    if (pu && au && !sideDone.has(lIdx) && !sideDone.has(rIdx)) {
      sbattles.push({ pIdx:lIdx, aIdx:rIdx, pUnit:pu, aUnit:au,
        pPower:calcBattlePower(lIdx,true), aPower:calcBattlePower(rIdx,false) });
      sideDone.add(lIdx); sideDone.add(rIdx);
    }
    // Also check player at right, AI at left
    const pu2 = player.board[rIdx], au2 = ai.board[lIdx];
    if (pu2 && au2 && !sideDone.has(rIdx) && !sideDone.has(lIdx)) {
      sbattles.push({ pIdx:rIdx, aIdx:lIdx, pUnit:pu2, aUnit:au2,
        pPower:calcBattlePower(rIdx,true), aPower:calcBattlePower(lIdx,false) });
      sideDone.add(rIdx); sideDone.add(lIdx);
    }
  }
  // Remove side fighters
  sbattles.forEach(b => { player.board[b.pIdx]=null; ai.board[b.aIdx]=null; });
  // Resolve with 50% commitment
  sbattles.forEach(b => {
    const {pIdx,aIdx,pUnit,aUnit,pPower,aPower} = b;
    const pn=pUnit.char.name, an=aUnit.char.name;
    const pFull=pUnit.troops, aFull=aUnit.troops;
    const pComm=pFull*0.5, aComm=aFull*0.5;
    const pPol2 = pUnit.char.politics * (isFlagUnit(pIdx, true) ? 1.1 : 1);
    const aPol2 = aUnit.char.politics * (isFlagUnit(aIdx, false) ? 1.1 : 1);
    const pRed=(1-pPol2/240), aRed=(1-aPol2/240);
    let pLoss,aLoss;
    if (pPower > aPower) { pLoss=Math.round(pComm*0.34*pRed); aLoss=Math.round(aComm*0.8*aRed); }
    else if (aPower > pPower) { pLoss=Math.round(pComm*0.8*pRed); aLoss=Math.round(aComm*0.34*aRed); }
    else { pLoss=Math.round(pComm*0.57*pRed); aLoss=Math.round(aComm*0.57*aRed); }
    pUnit.troops=Math.max(0,pUnit.troops-pLoss); aUnit.troops=Math.max(0,aUnit.troops-aLoss);
    if (pLoss>0) recordMelee(aUnit.uid, pLoss);
    if (aLoss>0) recordMelee(pUnit.uid, aLoss);
    const pAlive=pUnit.troops>0, aAlive=aUnit.troops>0;
    if (pAlive) player.board[pIdx]=pUnit; else { markCooldown(pUnit.char.id,true); recordKill(aUnit.uid); }
    if (aAlive) ai.board[aIdx]=aUnit; else { markCooldown(aUnit.char.id,false); recordKill(pUnit.uid); }
    const w = pPower>aPower?'胜':(aPower>pPower?'败':'平');
    const sTag = pPower > aPower ? '优' : (pPower < aPower ? '劣' : '均');
    allRes.push(`[侧${w}] ${pAlive?pn:'💀'+pn}(${sTag})(战${pPower}) ${pFull}→${pUnit.troops}[-${pLoss}] vs ${aAlive?an:'💀'+an}(战${aPower}) ${aFull}→${aUnit.troops}[-${aLoss}]`);
  });

  // Log results
  allRes.forEach(r => addBattleLog(`⚔ ${r}`,'info'));
  if (!allRes.length) addBattleLog('⚔ 无接触，无战斗','info');

  // --- Triple encirclement detection + animations ---
  const anims=[];
  for (let i=0;i<64;i++) {
    if (isTripleSurrounded(i,true) && player.board[i]) {
      anims.push({idx:i,type:'retreating'});
      addBattleLog(`⚠ ${player.board[i].char.name} 陷入三方包围，大退缩！周围9格属性-10%`,'lose');
      // Credit surrounding AI units
      const r=rowOf(i), c=colOf(i);
      [-1,0,0].forEach((dr,di)=>{ const dc=di===0?0:(di===1?-1:1); const nr=r+dr, nc=c+dc; if(nr>=0&&nr<8&&nc>=0&&nc<8&&ai.board[nr*8+nc]) recordRetreat(ai.board[nr*8+nc].uid); });
    }
    if (isTripleSurrounded(i,false) && ai.board[i]) {
      anims.push({idx:i,type:'retreating'});
      addBattleLog(`⚠ 敌方 ${ai.board[i].char.name} 陷入三方包围而退缩！周围9格属性-10%`,'win');
      // Credit surrounding player units
      const r=rowOf(i), c=colOf(i);
      [1,0,0].forEach((dr,di)=>{ const dc=di===0?0:(di===1?-1:1); const nr=r+dr, nc=c+dc; if(nr>=0&&nr<8&&nc>=0&&nc<8&&player.board[nr*8+nc]) recordRetreat(player.board[nr*8+nc].uid); });
    }
  }
  if (anims.length) {
    window.animQueue=anims;
    renderBoardFull();
    setTimeout(()=>{window.animQueue=null;renderBoardFull();},1000);
  }

  // Flag bearer battle death → count as scatter (was missed by scatter check since unit already removed)
  if (pFlagUnit && !player.board.some(u=>u&&u.uid===pFlagUnit.uid)) {
    flagScatterCount.player++;
    addBattleLog(`⚠ 旗手战死！(${flagScatterCount.player}/3)`,'lose');
  }
  if (aFlagUnit && !ai.board.some(u=>u&&u.uid===aFlagUnit.uid)) {
    flagScatterCount.ai++;
    addBattleLog(`⚠ 敌方旗手战死！(${flagScatterCount.ai}/3)`,'win');
  }

  // Step 6: Politics recovery (政治) — recover % of lost troops based on politics
  for (let side=0;side<2;side++) {
    const isP = side===0;
    const brd = isP ? player.board : ai.board;
    for (let i=0;i<64;i++) {
      const u = brd[i];
      if (!u) continue;
      let sumPol = u.char.politics;
      getNeighborIndices(i).forEach(ni => { const nu = brd[ni]; if (nu) sumPol += nu.char.politics; });
      const loss = (initTroopsByUid[u.uid]||0) - u.troops;
      if (loss > 0) {
        const rate = Math.min(sumPol * 0.001, 0.6);
        u.troops = Math.min(u.troops + Math.floor(loss * rate), 10000);
      }
    }
  }

  // --- Scatter check: all units with troops < 100 are removed ---
  for (let side=0;side<2;side++) {
    const isP = side===0;
    const brd = isP ? player.board : ai.board;
    for (let i=0;i<64;i++) {
      const u = brd[i];
      if (u && u.troops < 100) {
        markCooldown(u.char.id, isP, 'scatter');
        scatterCount[u.char.id] = (scatterCount[u.char.id]||0) + 1;
        const isDeadNow = scatterCount[u.char.id] >= 2;
        if (isDeadNow && !isDead(u.char.id)) deadList.push(u.char.id);
        // Flag bearer scatter tracking
        if (u.uid === pFlagUnit?.uid) { flagScatterCount.player++; addBattleLog(`⚠ 旗手溃散！(${flagScatterCount.player}/3)`,'lose'); }
        if (u.uid === aFlagUnit?.uid) { flagScatterCount.ai++; addBattleLog(`⚠ 敌方旗手溃散！(${flagScatterCount.ai}/3)`,'win'); }
        addBattleLog(`${isP?'':'敌方'}${u.char.name} 兵力不足100，${isDeadNow?'战死':'溃散'}！${isDeadNow?'★ 已战死，本局无法再使用 ★':''}`,'lose');
        brd[i] = null;
      }
    }
  }
  updateFlagScatterUI();
  tryRecruitAI();
  updateSpectatorGrid();

  // Step 9: update flag indices
  const findFlag = (board, pu) => {
    if (!pu) return -1;
    for (let i=0;i<64;i++) if (board[i]&&board[i].uid===pu.uid) return i;
    return -1;
  };
  const np=findFlag(player.board,pFlagUnit); player.flagIdx=np>=0?np:-1;
  if (player.flagIdx<0) { const re=findHighestTroopsIdx(player.board); if (re>=0) { player.flagIdx=re; addBattleLog(`${player.board[re].char.name}(${player.board[re].troops.toLocaleString()}兵)继任旗手🚩`,'info'); } }
  const na=findFlag(ai.board,aFlagUnit); ai.flagIdx=na>=0?na:-1;
  if (ai.flagIdx<0) { const re=findHighestTroopsIdx(ai.board); if (re>=0) ai.flagIdx=re; }

  renderBoardFull(); updateUI();

  // Step 10: check victory
  const pFR=player.flagIdx>=0?rowOf(player.flagIdx):-1, aFR=ai.flagIdx>=0?rowOf(ai.flagIdx):-1;
  const pA=player.board.some(u=>u), aA=ai.board.some(u=>u);
  setTimeout(() => {
    if (pFR===0 && aFR===7) {
      const pF=player.board[player.flagIdx], aF=ai.board[ai.flagIdx];
      if (pF && aF) {
        if (pF.troops > aF.troops) { gamePhase='gameover'; setPhase('🎉 胜利！'); addBattleLog(`🎉 同时达阵！我方旗手${pF.troops.toLocaleString()}兵 > 敌方${aF.troops.toLocaleString()}兵`,'win'); showVictory(true); return; }
        if (aF.troops > pF.troops) { gamePhase='gameover'; setPhase('💀 战败！'); addBattleLog(`💀 同时达阵！敌方旗手${aF.troops.toLocaleString()}兵 > 我方${pF.troops.toLocaleString()}兵`,'lose'); showVictory(false); return; }
        gamePhase='gameover'; setPhase('⚖ 平局'); addBattleLog(`⚖ 同时达阵，双方兵力均为${pF.troops.toLocaleString()}，平局`,'info'); return;
      }
    }
    if (pFR===0) { gamePhase='gameover'; addBattleLog('🎉 旗手抵达敌阵，大胜！','win'); setPhase('🎉 胜利！'); showVictory(true); return; }
    if (aFR===7) { gamePhase='gameover'; addBattleLog('💀 敌方旗手抵达底线，战败！','lose'); setPhase('💀 战败！'); showVictory(false); return; }
    if (drawPile.length===0&&!pA&&aA) { gamePhase='gameover'; addBattleLog('💀 我方覆灭','lose'); setPhase('💀 战败！'); showVictory(false); return; }
    if (drawPile.length===0&&pA&&!aA) { gamePhase='gameover'; addBattleLog('🎉 敌方覆灭','win'); setPhase('🎉 胜利！'); showVictory(true); return; }
    if (flagScatterCount.player >= 3) { gamePhase='gameover'; addBattleLog('💀 旗手溃散3次，我方战败！','lose'); setPhase('💀 战败！'); showVictory(false); return; }
    if (flagScatterCount.ai >= 3) { gamePhase='gameover'; addBattleLog('🎉 敌方旗手溃散3次，我方胜利！','win'); setPhase('🎉 胜利！'); showVictory(true); return; }
    gamePhase='draw'; placedThisTurn=0; selectedChar=null; selectedCell=null;
    autoPlay = false;
    document.getElementById('btnAutoPlace').textContent = '托管';
    document.getElementById('btnAutoPlace').className = 'btn btn-small';
    setPhase(`第${round}回合结束 · 点击「抽卡」继续`);
    document.getElementById('btnDraw').disabled = false;
    document.getElementById('btnEndTurn').disabled = false;
    document.getElementById('btnAutoPlace').disabled = false;
    updateUI();
  }, 500);
}

// ==================== UI ====================
function setPhase(msg) { document.getElementById('phaseBanner').innerHTML = msg; }
function showVictory(win) {
  const ov=document.getElementById('victoryOverlay');
  document.getElementById('vIcon').textContent=win?'🏆':'💀';
  document.getElementById('vTitle').textContent=win?'胜利！':'战败...';
  document.getElementById('vTitle').className='v-title '+(win?'win':'lose');
  document.getElementById('vSub').textContent=win?'敌阵已被突破，天下尽在掌中！':'防线崩溃...来日再战！';
  document.getElementById('vIcon').style.animation='vBounce 1s ease-out';
  // Calculate MVP from winning side
  const mvpEl=document.getElementById('mvpDisplay');
  const side=win?player:ai;
  let bestUid=null, bestDmg=-1, bestChar=null;
  for (const uid in combatStats) {
    const unitOnBoard = side.board.some(u=>u&&u.uid==uid);
    const stat=combatStats[uid];
    if (unitOnBoard && stat.damage>bestDmg) { bestDmg=stat.damage; bestUid=uid; }
  }
  if (bestUid) {
    // Find the char object
    for (const u of side.board) if (u&&u.uid==bestUid) { bestChar=u.char; break; }
  }
  if (bestChar) {
    const s=combatStats[bestUid];
    const avgMelee=s.meleeHits>0?Math.round(s.meleeDmg/s.meleeHits):0;
    const avgRanged=s.rangedHits>0?Math.round(s.rangedDmg/s.rangedHits):0;
    mvpEl.style.display='block';
    mvpEl.innerHTML=`<div class="v-mvp"><div class="v-mvp-title">🏅 MVP — ${bestChar.name}</div><div style="display:flex;align-items:center;gap:12px;margin-bottom:8px"><img class="v-mvp-avatar" src="${generateAvatar(bestChar,40)}"><div><div class="v-mvp-name">${bestChar.name}</div><div class="v-mvp-meta">${bestChar.type||''} · ${bestChar.rating||''} · 统${bestChar.leadership} 武${bestChar.martial} 智${bestChar.intelligence} 政${bestChar.politics}</div></div></div><div class="v-mvp-row"><span class="lab">总伤害</span><span class="val">${s.damage.toLocaleString()}</span></div><div class="v-mvp-row"><span class="lab">近战均伤</span><span class="val">${s.meleeHits}次 · 每次${avgMelee.toLocaleString()}</span></div><div class="v-mvp-row"><span class="lab">远程均伤</span><span class="val">${s.rangedHits}次 · 每次${avgRanged.toLocaleString()}</span></div><div class="v-mvp-row"><span class="lab">击溃/击毙</span><span class="val">${s.kills}人</span></div><div class="v-mvp-row"><span class="lab">大威风</span><span class="val">${s.retreatTriggers}次</span></div></div>`;
  } else {
    mvpEl.style.display='none';
  }
  ov.className='show';
}
function addBattleLog(msg, type='info') {
  const el = document.getElementById('battleLog');
  const div = document.createElement('div');
  div.className = 'entry ' + type;
  div.textContent = msg;
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}

function totalTroops(side) {
  let t = 0;
  for (let i=0;i<64;i++) if (side.board[i]) t += side.board[i].troops;
  return t;
}
function decayIncome(side) {
  const boardT = totalTroops(side);
  let income = Math.floor(TROOP_INCOME * Math.max(0, 1 - boardT / MAX_TOTAL_TROOPS));
  // Politics multiplier: total politics of friendly units on board
  let sumPol = 0;
  for (let i=0;i<64;i++) if (side.board[i]) sumPol += side.board[i].char.politics;
  const polMult = Math.max(0.2, Math.min(2.0, sumPol * 0.001));
  income = Math.floor(income * polMult);
  const maxAdd = MAX_TOTAL_TROOPS - boardT - side.troops;
  return Math.max(0, Math.min(income, maxAdd));
}
function updateUI() {
  document.getElementById('playerTroops').textContent = player.troops.toLocaleString();
  document.getElementById('aiTroops').textContent = ai.troops.toLocaleString();
  document.getElementById('playerTotalTroops').textContent = totalTroops(player).toLocaleString();
  document.getElementById('aiTotalTroops').textContent = totalTroops(ai).toLocaleString();
  document.getElementById('drawPileCount').textContent = drawPile.length;
  updateCollectionGrid(); updateAiCollectionGrid(); updateFlagScatterUI(); updateSpectatorGrid();
}

function recruitFromSpectator(charId, isPlayer) {
  const idx = spectatorPool.findIndex(c => c.id === charId);
  if (idx < 0) return;
  const ch = spectatorPool.splice(idx, 1)[0];
  (isPlayer ? player : ai).collection.push(ch);
  addBattleLog(`${isPlayer?'':'敌方'}招募了 ${ch.name} 加入阵营`,'info');
  updateUI();
}

function tryRecruitAI() {
  if (survivingCount(ai) >= 10 || spectatorPool.length === 0) return;
  const ratingOrder={ 'S+':0,'S':1,'A':2,'B':3,'C':4,'D':5 };
  const best = spectatorPool.reduce((a,b) => (ratingOrder[a.rating]??9) < (ratingOrder[b.rating]??9) ? a : b);
  spectatorPool.splice(spectatorPool.indexOf(best), 1);
  ai.collection.push(best);
  addBattleLog(`敌方招募了 ${best.name} 加入阵营`,'info');
}

function updateSpectatorGrid() {
  const el = document.getElementById('spectatorGrid');
  const section = document.getElementById('spectatorSection');
  const pSurvive = survivingCount(player);
  const canRecruit = pSurvive < 10;
  if (!spectatorPool.length) { section.style.display='none'; return; }
  section.style.display='block';
  document.getElementById('specHint').textContent = canRecruit ? `己方存活${pSurvive}/10 · 点击招募` : `己方存活${pSurvive}/10`;
  el.innerHTML = '';
  const ratingOrder={ 'S+':0,'S':1,'A':2,'B':3,'C':4,'D':5 };
  const totalScore = ch => ch.leadership+ch.martial+ch.intelligence+ch.politics;
  const sorted = [...spectatorPool].sort((a,b) => {
    const ra=ratingOrder[a.rating]??9, rb=ratingOrder[b.rating]??9;
    if (ra!==rb) return ra-rb;
    return totalScore(b)-totalScore(a);
  });
  sorted.forEach(c => {
    const div = document.createElement('div');
    div.className = 'char-card';
    let html = `<img class="cc-avatar" src="${generateAvatar(c,22)}"><div class="cname">${c.name}</div><div class="cmeta">${c.type||''}</div><div class="crating">${c.rating||''}</div>`;
    if (canRecruit) { html += '<div style="font-size:9px;color:#4caf50;text-align:center">招募</div>'; }
    div.innerHTML = html;
    if (canRecruit) div.addEventListener('click', () => recruitFromSpectator(c.id, true));
    el.appendChild(div);
  });
}

function updateCollectionGrid() {
  const el = document.getElementById('collectionGrid');
  const empty = document.getElementById('emptyTip');
  if (!player.collection.length) { el.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  let filtered = [...player.collection];
  if (playerCatFilter !== 'all') filtered = filtered.filter(c => c.type === playerCatFilter);
  filtered.sort((a,b) => {
    const ratingOrder={ 'S+':0,'S':1,'A':2,'B':3,'C':4,'D':5 };
    const aDead=isDead(a.id), bDead=isDead(b.id);
    const aCd=isOnCooldown(a.id,true), bCd=isOnCooldown(b.id,true);
    const aOn=player.board.some(u=>u&&u.char.id===a.id)||ai.board.some(u=>u&&u.char.id===a.id);
    const bOn=player.board.some(u=>u&&u.char.id===b.id)||ai.board.some(u=>u&&u.char.id===b.id);
    const aG=aDead?3:(aCd?2:(aOn?1:0));
    const bG=bDead?3:(bCd?2:(bOn?1:0));
    if (aG!==bG) return aG-bG;
    return (ratingOrder[a.rating]??9)-(ratingOrder[b.rating]??9);
  });
  el.innerHTML = '';
  filtered.forEach(c => {
    const onBoard = player.board.some(u=>u&&u.char.id===c.id);
    const onAi = ai.board.some(u=>u&&u.char.id===c.id);
    const div = document.createElement('div');
    const onCooldown = isOnCooldown(c.id, true);
    const cdRemaining = onCooldown ? (playerCooldowns.find(x => x.id === c.id)) : null;
    const freezeRemaining = cdRemaining ? Math.max(0, (cdRemaining.round + 2) - round + 1) : 0;
    const dead = isDead(c.id);
    div.className = 'char-card';
    if (dead) div.classList.add('dead');
    else if (onBoard||onAi) div.classList.add('used');
    else if (onCooldown) div.classList.add('cooldown');
    if (selectedChar&&selectedChar.id===c.id) div.classList.add('selected');
    div.innerHTML = `<img class="cc-avatar" src="${generateAvatar(c,22)}"><div class="cname">${c.name}</div><div class="cmeta">${c.type||''}</div><div class="crating">${c.rating||''}</div>${dead ? '<div class="dead-badge">死</div>' : onCooldown ? `<div class="freeze-badge ${cdRemaining.type==='scatter'?'scatter':''}">${cdRemaining.type==='scatter'?'溃':'❄'}${freezeRemaining}</div>` : ''}`;
    div.addEventListener('click', ()=>{
      showCharDetail(c, onBoard, onAi || onCooldown || dead);
      if (onBoard||onAi||onCooldown||dead) return;
      selectedChar=c; updateCollectionGrid();
      if (gamePhase==='place_player') setPhase(`已选 ${c.name} · 点击下方空位放置`);
    });
    el.appendChild(div);
  });
}

function updateAiCollectionGrid() {
  const el = document.getElementById('aiCollectionGrid');
  const empty = document.getElementById('aiEmptyTip');
  if (!ai.collection.length) { el.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  let filtered = [...ai.collection];
  if (aiCatFilter !== 'all') filtered = filtered.filter(c => c.type === aiCatFilter);
  const totalScore = ch => ch.leadership+ch.martial+ch.intelligence+ch.politics;
  const ratingOrder={ 'S+':0,'S':1,'A':2,'B':3,'C':4,'D':5 };
  filtered.sort((a,b) => {
    const aDead=isDead(a.id), bDead=isDead(b.id);
    const aCd=isOnCooldown(a.id,false), bCd=isOnCooldown(b.id,false);
    const aGrp=aDead?2:(aCd?1:0);
    const bGrp=bDead?2:(bCd?1:0);
    if (aGrp!==bGrp) return aGrp-bGrp;
    const ra=ratingOrder[a.rating]??9, rb=ratingOrder[b.rating]??9;
    if (ra!==rb) return ra-rb;
    return totalScore(b)-totalScore(a);
  });
  el.innerHTML = '';
  filtered.forEach(c => {
    const onBoard = ai.board.some(u=>u&&u.char.id===c.id);
    const onCooldown = isOnCooldown(c.id, false);
    const cdRemaining = onCooldown ? (aiCooldowns.find(x => x.id === c.id)) : null;
    const freezeRemaining = cdRemaining ? Math.max(0, (cdRemaining.round + 2) - round + 1) : 0;
    const dead = isDead(c.id);
    const div = document.createElement('div');
    div.className = 'char-card';
    if (dead) div.classList.add('dead');
    else if (onBoard) div.classList.add('used');
    else if (onCooldown) div.classList.add('cooldown');
    div.innerHTML = `<img class="cc-avatar" src="${generateAvatar(c,22)}"><div class="cname">${c.name}</div><div class="cmeta">${c.type||''}</div><div class="crating">${c.rating||''}</div>${dead ? '<div class="dead-badge">死</div>' : onCooldown ? `<div class="freeze-badge ${cdRemaining.type==='scatter'?'scatter':''}">${cdRemaining.type==='scatter'?'溃':'❄'}${freezeRemaining}</div>` : ''}`;
    el.appendChild(div);
  });
}

// ==================== FILTERS ====================
function initFilters() {
  ['catFilters','aiCatFilters'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    const add = (label, cat) => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (cat==='all'?' active':'');
      btn.textContent = label;
      btn.addEventListener('click', ()=>{
        el.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const $ = id==='catFilters' ? 'playerCatFilter' : 'aiCatFilter';
        if ($==='playerCatFilter') { playerCatFilter=cat; updateCollectionGrid(); }
        else { aiCatFilter=cat; updateAiCollectionGrid(); }
      });
      el.appendChild(btn);
    };
    add('全部','all');
    CAT_NAMES.forEach(n => add(n,n));
  });
}

// ==================== INIT ====================
initBoard();
resetGame();
renderBoardFull();
</script>
