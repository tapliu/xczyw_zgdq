<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信长之野望-战国夺旗</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
<h1>⚔ 信长之野望-战国夺旗</h1>
<div class="terrain-select">
<button class="btn btn-xs btn-outline active" id="btnTerrainNormal" onclick="setTerrain('normal')">普通</button>
<button class="btn btn-xs btn-outline" id="btnTerrainNagashino" onclick="setTerrain('nagashino')">长篠</button>
<button class="btn btn-xs btn-outline" id="btnTerrainTennozan" onclick="setTerrain('tennozan')">天王山</button>
</div>
<div class="header-info">
<span class="stat">回合 <b class="round-display" id="roundDisplay">0</b></span>
<span class="stat">📦 牌堆 <b id="drawPileCount">100</b></span>
<span class="stat">🔵 己方  <b class="troop-display player" id="playerTroops">50000</b><span class="inc-tag" id="pIncome">+0/回合</span></span>
<span class="stat">🔴 敌方  <b class="troop-display ai" id="aiTroops">50000</b><span class="inc-tag" id="aIncome">+0/回合</span></span>
</div>
</header>

<div class="container">
<div class="board-wrapper">
<div class="phase-banner" id="phaseBanner">点击「抽卡」开始</div>
<div class="troop-summary"><span class="total-player">🔵 总兵力 <b id="playerTotalTroops">50000</b></span><span class="flag-scatter p" id="pFlagScatter">🚩溃散 0/3</span><span class="placement-count" id="placementCount">已放 0/5</span><span class="flag-scatter a" id="aFlagScatter">🚩溃散 0/3</span><span class="total-ai">🔴 总兵力 <b id="aiTotalTroops">50000</b></span></div>
<div class="board" id="board"><div class="divider"></div></div>
<div style="display:flex;gap:4px;margin-top:5px;flex-wrap:wrap">
<button class="btn btn-gold" id="btnDraw" onclick="drawPhase()">抽卡</button>
<button class="btn btn-small" id="btnAutoPlace" onclick="toggleAutoPlay()">托管</button>
<button class="btn btn-outline btn-small" id="btnEndTurn" onclick="endPlacement()">结束放置</button>
<button class="btn btn-outline btn-small" onclick="resetGame()">重置</button>
</div>
</div>

<div class="right-panel">
<div class="detail-panel" id="detailPanel"></div>

<div class="section">
<div class="sec-hdr"><h3>⚔ 战报</h3><span style="font-size:10px;color:#888" id="phaseHint">-</span></div>
<div class="battle-log" id="battleLog"><div class="entry info">点击「抽卡」开始对局</div></div>
</div>

<div class="section" id="collectionSection">
<div class="sec-hdr">
<h3>🎴 己方武将</h3>
<div class="cat-filters" id="catFilters"></div>
</div>
<div class="sort-bar" id="sortBar">
<button class="sort-btn active" data-sort="default">默认</button>
<button class="sort-btn" data-sort="leadership">统率</button>
<button class="sort-btn" data-sort="martial">武力</button>
<button class="sort-btn" data-sort="intelligence">智力</button>
<button class="sort-btn" data-sort="politics">政治</button>
</div>
<div class="col-grid" id="collectionGrid"></div>
<div id="emptyTip">抽卡后武将将显示在这里</div>
</div>

<div class="section">
<div class="sec-hdr">
<h3>👹 敌方武将</h3>
<div class="cat-filters" id="aiCatFilters"></div>
</div>
<div class="col-grid" id="aiCollectionGrid"></div>
<div id="aiEmptyTip" style="text-align:center;padding:8px;color:#555;font-size:11px">-</div>
</div>

<div class="section" id="spectatorSection" style="display:none">
<div class="sec-hdr"><h3>👀 观战席</h3><span id="specHint" style="font-size:10px;color:#888">可招募</span></div>
<div class="col-grid" id="spectatorGrid"></div>
</div>
</div>
</div>

<div class="troop-modal" id="troopModal">
<div class="modal">
<h2 id="tmName">-</h2>
<div class="sub" id="tmSub">统率 99 · 最大兵力 9900</div>
<div class="slide-row">
<span style="font-size:11px;color:#aaa">兵力:</span>
<input type="range" id="troopSlider" min="1" max="10000" value="5000" oninput="updateTroopDisplay()">
<span class="tv" id="troopValue">5000</span>
</div>
<div style="display:flex;gap:6px;justify-content:center;margin-top:4px">
<button class="btn btn-small btn-gold" onclick="confirmPlace()">放置</button>
<button class="btn btn-small btn-outline" onclick="cancelPlace()">取消</button>
</div>
</div>
</div>

<div id="victoryOverlay"><div class="v-box"><div class="v-icon" id="vIcon"></div><div class="v-title" id="vTitle"></div><div class="v-sub" id="vSub"></div><div id="mvpDisplay" style="display:none"></div><div id="rankDisplay" class="v-rankings"></div><button class="v-btn" onclick="location.reload()">再来一局</button></div></div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
</body>
</html>
